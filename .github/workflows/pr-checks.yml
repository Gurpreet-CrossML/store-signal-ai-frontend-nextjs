name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-typecheck:
    name: Lint, Format, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (lint)
        run: npm run lint

      - name: Run Prettier (format check)
        run: npx prettier --check .

      - name: Run TypeScript (type check)
        run: npx tsc --noEmit

      - name: Run Next.js build (compile check)
        run: npm run build
